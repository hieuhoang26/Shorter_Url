version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      - echo Nothing to do in the pre_build phase...
  build:
    commands:
      - echo Build started on `date` -DskipTests
      - mvn clean install -DskipTests
  post_build:
    commands:
      - echo Build completed on `date`
      - aws s3 cp target/*.jar s3://codebuild-ex/builds/
artifacts:
  files:
    - target/**/*.jar
  discard-paths: yes