spring:
  application:
    name: shorter-url
  datasource:
    url: jdbc:postgresql://localhost:5432/shorter_url
    username: postgres
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db-changelog.xml
    enabled: true
  batch:
    jdbc:
      initialize-schema: always   # create Spring Batch job tables on PostgreSQL
    job:
      enabled: false              # prevent auto-run of jobs at startup

aws:
  s3:
    bucket: shorter-url-390402567579-ap-southeast-1-an
    region: ap-southeast-1
    access-key: ${AWS_ACCESS_KEY:AKIAVVZOONWNQCOU66K3}
    secret-key: ${AWS_SECRET_KEY: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}

server:
  port: 8080

app:
  batch:
    chunk-size: 100
    skip-limit: 1000
  shortener:
    secret-key: 238947239487
    charset: "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ"
    min-length: 6

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always   # hiển thị detail của S3
      probes:
        enabled: true        # enable liveness/readiness (optional)